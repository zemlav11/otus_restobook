openapi: 3.0.3
info:
  title: Kiosk Self‑Service API
  version: 1.0.0
  description: API для стойки самообслуживания (оформление заказа)

servers:
  - url: https://zemlav11.github.io/otus_restobook/swagger.html
    description: server otus_restobook

tags:
  - name: Categories
    description: Просмотр меню, категорий и товаров
  - name: Carts
    description: Работа с корзиной
  - name: Orders
    description: Управление заказом
  - name: Loyalty
    description: Программа лояльности
  - name: Payments
    description: Проведение оплаты

paths:
  # ==================== Categories ====================
  /categories:
    get:
      tags: [Categories]
      summary: Получить список категорий
      operationId: getCategories
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /categories/{categoryId}/items:
    get:
      tags: [Categories]
      summary: Получить блюда в категории
      operationId: getItemsByCategory
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Список блюд
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'

  /items/{itemId}:
    get:
      tags: [Categories]
      summary: Детальная информация о блюде (включая модификаторы)
      operationId: getItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Данные блюда
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'

  # ==================== Carts ====================
  /carts:
    post:
      tags: [Carts]
      summary: Создать новую корзину
      operationId: createCart
      responses:
        '201':
          description: Корзина создана
          content:
            application/json:
              schema:
                type: object
                properties:
                  cartId:
                    type: string

  /carts/{cartId}:
    get:
      tags: [Carts]
      summary: Получить состояние корзины
      operationId: getCart
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Корзина
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '404':
          description: Корзина не найдена

    delete:
      tags: [Carts]
      summary: Очистить корзину полностью
      operationId: clearCart
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Корзина очищена
        '404':
          description: Корзина не найдена

  /carts/{cartId}/items:
    post:
      tags: [Carts]
      summary: Добавить товар в корзину
      operationId: addItemToCart
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemId, quantity]
              properties:
                itemId:
                  type: string
                  description: Идентификатор товара из меню
                quantity:
                  type: integer
                  minimum: 1
                  description: Количество добавляемых единиц товара
                modifiers:
                  type: array
                  description: Список идентификаторов выбранных модификаторов (размер, доп. ингредиенты и т.п.)
                  items:
                    type: string
      responses:
        '200':
          description: Позиция добавлена, возвращается обновлённая корзина
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Неверные данные (неверный itemId, конфликтующие модификаторы)
        '404':
          description: Корзина не найдена
        '409':
          description: Товар или модификаторы временно недоступны (нет ингредиентов)

  /carts/{cartId}/items/{cartItemId}:
    put:
      tags: [Carts]
      summary: Изменить количество позиции в корзине
      operationId: updateCartItemQuantity
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
        - name: cartItemId
          in: path
          required: true
          schema:
            type: string
          description: Идентификатор позиции в корзине (присваивается при добавлении)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  description: Новое количество товара в данной позиции
      responses:
        '200':
          description: Корзина обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Неверное количество
        '404':
          description: Корзина или позиция не найдены

    delete:
      tags: [Carts]
      summary: Удалить позицию из корзины
      operationId: removeCartItem
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
        - name: cartItemId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Корзина обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '404':
          description: Корзина или позиция не найдены

  /carts/{cartId}/checkout:
    post:
      tags: [Carts]
      summary: Применить акции и перейти к оплате
      operationId: checkout
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Корзина с применёнными скидками и подарками
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '404':
          description: Корзина не найдена

  /carts/{cartId}/dining-option:
    put:
      tags: [Carts]
      summary: Установить способ употребления
      operationId: setDiningOption
      parameters:
        - name: cartId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                option:
                  type: string
                  enum: [DINE_IN, TAKEAWAY]
      responses:
        '200':
          description: Корзина обновлена
        '404':
          description: Корзина не найдена

  # ==================== Orders ====================
  /orders:
    post:
      tags: [Orders]
      summary: Создать заказ
      operationId: createOrder
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          required: true
          description: Уникальный ключ идемпотентности
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cartId:
                  type: string
                paymentId:
                  type: string
      responses:
        '201':
          description: Заказ создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Неверные данные
        '409':
          description: Конфликт (например, корзина уже оформлена)

  /orders/{orderId}:
    get:
      tags: [Orders]
      summary: Получить детали заказа
      operationId: getOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Данные заказа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Заказ не найден

    patch:
      tags: [Orders]
      summary: Редактирование заказа до оплаты (корзина, способ получения)
      operationId: patchOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/CartItem'
                diningOption:
                  type: string
                  enum: [DINE_IN, TAKEAWAY]
      responses:
        '200':
          description: Заказ обновлён
        '404':
          description: Заказ не найден

    delete:
      tags: [Orders]
      summary: Отмена заказа до оплаты
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Заказ аннулирован
        '404':
          description: Заказ не найден

  /orders/active:
    get:
      tags: [Orders]
      summary: Получить список активных заказов для табло
      operationId: getActiveOrders
      responses:
        '200':
          description: Список активных заказов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActiveOrder'

  # ==================== Loyalty ====================
  /loyalty/request-code:
    post:
      tags: [Loyalty]
      summary: Запросить SMS-код для регистрации/авторизации
      operationId: requestLoyaltyCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyCodeRequest'
      responses:
        '202':
          description: Код отправлен
        '400':
          description: Неверный формат номера

  /loyalty/verify:
    post:
      tags: [Loyalty]
      summary: Подтвердить код и получить JWT
      operationId: verifyLoyaltyCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoyaltyVerifyRequest'
      responses:
        '200':
          description: Успешная авторизация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoyaltyAuthResponse'
        '401':
          description: Неверный код
        '429':
          description: Слишком много попыток

  /loyalty/balance:
    get:
      tags: [Loyalty]
      summary: Получить текущий баланс баллов
      operationId: getBalance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Баланс
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '401':
          description: Неавторизован

  /loyalty/spend:
    post:
      tags: [Loyalty]
      summary: Зарезервировать списание баллов (вызывается перед оплатой)
      operationId: spendPoints
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpendPointsRequest'
      responses:
        '200':
          description: Баллы зарезервированы
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  newBalance:
                    type: integer
        '400':
          description: Недостаточно баллов или превышен лимит
        '401':
          description: Неавторизован

  /orders/{orderId}/loyalty/estimate-bonus:
    get:
      tags: [Loyalty]
      summary: Оценка количества баллов, которые будут начислены за заказ после оплаты
      operationId: estimateBonus
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Оценка бонусов
          content:
            application/json:
              schema:
                type: object
                properties:
                  estimated_points:
                    type: integer
        '401':
          description: Неавторизован
        '404':
          description: Заказ не найден

  /orders/{orderId}/loyalty/apply:
    post:
      tags: [Loyalty]
      summary: Списать баллы лояльности
      operationId: applyLoyaltyPoints
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                points_to_spend:
                  type: integer
      responses:
        '200':
          description: Сумма к оплате пересчитана
        '400':
          description: Недостаточно баллов
        '401':
          description: Неавторизован
        '404':
          description: Заказ не найден

  # ==================== Payments ====================
  /orders/{orderId}/pay/init:
    post:
      tags: [Payments]
      summary: Инициировать процесс оплаты
      operationId: initiatePayment
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [CARD, CASH]
      responses:
        '200':
          description: Терминал/купюроприемник готов к приему средств
        '404':
          description: Заказ не найден

  /orders/{orderId}/pay/confirm:
    post:
      tags: [Payments]
      summary: Фиксация факта оплаты и закрытие заказа
      description: После этого заказ уходит в производство и печатается чек.
      operationId: confirmPayment
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_id:
                  type: string
                amount_paid:
                  type: number
                printer_status:
                  type: string
                  enum: [OK, ERROR]
      responses:
        '200':
          description: Заказ оплачен, номер присвоен
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_number:
                    type: string
                    example: "A-42"
                  fiscal_receipt_printed:
                    type: boolean
                  bonus_earned:
                    type: integer
        '400':
          description: Ошибка при оплате (недостаточно средств, отказ банка)
        '404':
          description: Заказ не найден

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    ModifierGroup:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        min:
          type: integer
          description: Минимальное количество модификаторов из группы, которое нужно выбрать
        max:
          type: integer
          description: Максимальное количество модификаторов из группы
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/Modifier'

    Modifier:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
          format: float

    Item:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        basePrice:
          type: number
          format: float
        calories:
          type: integer
        imageUrl:
          type: string
        available:
          type: boolean
        modifierGroups:
          type: array
          description: Группы модификаторов (например, размер, дополнения)
          items:
            $ref: '#/components/schemas/ModifierGroup'

    CartItem:
      type: object
      properties:
        id:
          type: string
          description: Уникальный идентификатор позиции в корзине (cartItemId)
        itemId:
          type: string
          description: Идентификатор товара из меню
        name:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          description: Цена за единицу с учётом выбранных модификаторов
        totalPrice:
          type: number
        modifiers:
          type: array
          items:
            $ref: '#/components/schemas/Modifier'

    Cart:
      type: object
      properties:
        id:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalAmount:
          type: number
        appliedPromotions:
          type: array
          items:
            $ref: '#/components/schemas/AppliedPromotion'
        diningOption:
          type: string
          enum: [DINE_IN, TAKEAWAY]

    AppliedPromotion:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        discountAmount:
          type: number
        giftItem:
          $ref: '#/components/schemas/Item'

    Order:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [NEW, PAID, PREPARING, READY, COMPLETED, CANCELLED]
        createdAt:
          type: string
          format: date-time
        totalAmount:
          type: number
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        diningOption:
          type: string
        paymentMethod:
          type: string

    ActiveOrder:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
        ticketNumber:
          type: string

    LoyaltyCodeRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          pattern: '^\+7[0-9]{10}$'
          example: "+79161234567"

    LoyaltyVerifyRequest:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
        code:
          type: string

    LoyaltyAuthResponse:
      type: object
      properties:
        token:
          type: string
        balance:
          type: integer

    BalanceResponse:
      type: object
      properties:
        balance:
          type: integer

    SpendPointsRequest:
      type: object
      properties:
        cartId:
          type: string
        points:
          type: integer