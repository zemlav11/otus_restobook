openapi: 3.0.3
info:
  title: Kiosk API
  description: API для стойки самообслуживания (оформление заказа)
  version: 1.0.0
servers:
  - url: http://swagger.io/api/v1
    description: server

tags:
  - name: Cart
    description: Управление корзиной
  - name: Orders
    description: Информация о заказах

paths:
  /cart:
    get:
      tags: [Cart]
      summary: Получить текущую корзину
      security:
        - SessionID: []
        - BearerAuth: []
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /cart/items:
    post:
      tags: [Cart]
      summary: Добавить товар в корзину
      security:
        - SessionID: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemRequest'
      responses:
        '200':
          description: Обновлённая корзина
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Неверные данные

  /cart/items/{itemId}:
    put:
      tags: [Cart]
      summary: Изменить количество товара в позиции корзины
      description: |
        Позволяет изменить количество конкретной позиции в корзине.
      security:
        - SessionID: []
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
          description: Уникальный идентификатор позиции в корзине (возвращается при добавлении товара)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
      responses:
        '200':
          description: Корзина успешно обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          description: Неверный запрос (например, отрицательное количество)
        '404':
          description: Позиция с указанным itemId не найдена в текущей корзине

    delete:
      tags: [Cart]
      summary: Удалить позицию из корзины
      security:
        - SessionID: []
        - BearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Обновлённая корзина
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Получить информацию о заказе
      security:
        - SessionID: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Идентификатор заказа
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Заказ не найден

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SessionID:
      type: apiKey
      in: header
      name: X-Session-ID
      description: Идентификатор сессии для неавторизованных пользователей

  schemas:
    # ---------- Cart ----------
    CartItem:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        price:
          type: number
          description: Цена за единицу на момент добавления
        total:
          type: number
          description: price * quantity
        selectedIngredients:
          type: array
          items:
            type: integer
          description: Список ID ингредиентов для комбобургера

    Cart:
      type: object
      properties:
        id:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalAmount:
          type: number
          description: Сумма до применения скидок и бонусов
        servingType:
          type: string
          enum: [takeaway, dine-in]
          description: Способ употребления (с собой/в зале)
        appliedDiscounts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              amount:
                type: number
        bonusPointsToSpend:
          type: integer
          description: Количество баллов, которые пользователь решил списать
        bonusPointsEarned:
          type: integer
          description: Баллы, которые будут начислены после оплаты (если выбрано начисление)
        finalAmount:
          type: number
          description: Итоговая сумма к оплате (после скидок и списания баллов)
        giftAdded:
          type: boolean
          description: true, если добавлен подарок (например, стакан)

    AddItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1
        selectedIngredients:
          type: array
          items:
            type: integer
          description: Обязательно для комбобургеров

    UpdateItemRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          minimum: 0
          description: Если 0 — товар удаляется

    # ---------- Order (расширенная) ----------
    Order:
      type: object
      properties:
        id:
          type: integer
          example: 12345
        orderNumber:
          type: string
          example: "025"
        createdAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/OrderStatus'
        orderStatus:
          type: integer
          description: |
            Состояние заказа в платёжном шлюзе:
            * 0 – заказ зарегистрирован, но не оплачен
            * 1 – заказ оплачен
            * 2 – по заказу была проведена операция возврата
            * 3 – инициирована аутентификация через ACS Банка-эмитента
            * 4 – авторизация отклонена
          enum: [0, 1, 2, 3, 4]
          example: 0
        servingType:
          $ref: '#/components/schemas/ServingType'
        totalAmount:
          type: number
          description: Общая стоимость заказа до применения скидок и списания бонусов
        finalAmount:
          type: number
          description: Итоговая сумма к оплате после скидок и списания бонусов
        appliedDiscounts:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: "Скидка 10%"
              amount:
                type: number
                example: 50.0
        bonusPointsSpent:
          type: integer
          description: Количество бонусов, списанных при оплате
          example: 100
        bonusPointsEarned:
          type: integer
          description: Количество бонусов, начисленных за заказ
          example: 20
        giftAdded:
          type: boolean
          description: Добавлен ли подарок (например, стакан)
          example: false
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
                example: 101
              productName:
                type: string
                example: "Чизбургер"
              quantity:
                type: integer
                example: 2
              price:
                type: number
                example: 199.50
              total:
                type: number
                example: 399.00
              selectedIngredients:
                type: array
                items:
                  type: integer
                description: Идентификаторы выбранных ингредиентов (для комбобургера)
                example: [1, 3, 5]
        payments:
          type: array
          description: Список платежей по заказу (может быть несколько при смешанной оплате)
          items:
            $ref: '#/components/schemas/Payment'

    OrderStatus:
      type: string
      enum: [pending, paid, in-progress, ready, completed, cancelled]

    ServingType:
      type: string
      enum: [takeaway, dine-in]

    # ---------- Payment (общая схема с дискриминатором) ----------
    Payment:
      type: object
      properties:
        id:
          type: integer
          example: 5001
        amount:
          type: number
          description: Сумма платежа
          example: 399.00
        date:
          type: string
          format: date-time
          description: Дата и время совершения платежа
        status:
          type: string
          enum: [pending, completed, failed, refunded]
          description: Статус платежа
        transactionId:
          type: string
          description: Идентификатор транзакции в платёжной системе
          example: "txn_abc123"
        method:
          type: string
          enum: [card, cash, qr, bonus]
          description: Способ оплаты
      required:
        - method
        - amount
        - status
      discriminator:
        propertyName: method
        mapping:
          card: '#/components/schemas/CardPayment'
          cash: '#/components/schemas/CashPayment'
          qr: '#/components/schemas/QrPayment'
          bonus: '#/components/schemas/BonusPayment'

    CardPayment:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            maskedPan:
              type: string
              description: Маскированный номер карты
              example: "**** **** **** 1234"
            cardType:
              type: string
              enum: [visa, mastercard, mir, other]
              description: Тип карты
            expiry:
              type: string
              pattern: '^(0[1-9]|1[0-2])/[0-9]{2}$'
              description: Срок действия (ММ/ГГ)
              example: "12/25"
            holderName:
              type: string
              description: Имя держателя карты
              example: "IVAN PETROV"

    CashPayment:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            amountReceived:
              type: number
              description: Внесённая сумма наличными
              example: 500.00
            change:
              type: number
              description: Сдача
              example: 101.00
            receiptNumber:
              type: string
              description: Номер чека
              example: "1234567890"

    QrPayment:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            qrType:
              type: string
              enum: [sbp, sberpay, tinkoff, other]
              description: Тип QR-кода
              example: "sbp"
            qrData:
              type: string
              description: Данные для сканирования (ссылка или закодированная строка)
              example: "https://qr.nspk.ru/..."
            bank:
              type: string
              description: Банк получателя
              example: "Сбербанк"
            account:
              type: string
              description: Счёт получателя
              example: "40702810123450123456"

    BonusPayment:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            bonusPointsSpent:
              type: integer
              description: Количество списанных бонусов
              example: 100
            conversionRate:
              type: number
              description: Курс конвертации (сколько рублей за один бонус)
              example: 1.0
            remainingAmount:
              type: number
              description: Остаток суммы, оплаченный другим способом (если бонусов не хватило)
              example: 299.00